# Release builds for goscape-client.
#
# Triggered by revision-namespaced tags of the form rev<N>-v<semver>, e.g.
# `rev225-v1.0.0`. The revision lives in the tag name (and a tag points at a
# commit on that revision's branch), so releases across revisions never collide
# and every artifact name carries its revision (client-rev225-v1.0.0-<target>).
# Builds the client for 5 platforms on NATIVE
# GitHub-hosted runners — no cross-compilation. The native GLFW/go-gl backend
# needs CGO on every OS — Linux (X11/GL), macOS (Cocoa/GL), and Windows
# (opengl32 + a C toolchain) — which makes cross-CGO painful; native runners
# sidestep that entirely. Free arm64 hosted runners (public repos, since
# 2025-08) cover the linux/arm64 and macOS/arm64 targets. windows/arm64 is not
# built: the cgo toolchain on hosted ARM Windows runners targets x86-64, and
# Windows-on-ARM runs the windows/amd64 build via x64 emulation.
#
# Three stages:
#   test    — the shared CI gate (ci-gate.yml: `make ci`). Blocks the build, so
#             a tag that fails fmt/vet/test/lint can never publish artifacts.
#   build   — matrix over 6 native runners; each builds, archives, and uploads
#             its target as a workflow artifact.
#   release — downloads all artifacts, writes SHA256SUMS, creates the Release.
#
# Security: github.ref_name (the tag) is passed via env, never inlined into a
# run: script. The other ${{ }} uses are matrix.* / runner.* (workflow-defined,
# trusted), not untrusted event input.
name: Release

on:
  push:
    tags: ['rev*-v*']

permissions:
  contents: read

jobs:
  test:
    # Shared CI gate — a tag that fails it never reaches the build matrix.
    uses: ./.github/workflows/ci-gate.yml

  build:
    needs: test
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: linux-amd64,   os: ubuntu-26.04,     goos: linux,   goarch: amd64, cgo: "1", ext: tar.gz }
          - { target: linux-arm64,   os: ubuntu-26.04-arm, goos: linux,   goarch: arm64, cgo: "1", ext: tar.gz }
          - { target: darwin-amd64,  os: macos-26-intel,   goos: darwin,  goarch: amd64, cgo: "1", ext: tar.gz }
          - { target: darwin-arm64,  os: macos-15,         goos: darwin,  goarch: arm64, cgo: "1", ext: tar.gz }
          - { target: windows-amd64, os: windows-2025,     goos: windows, goarch: amd64, cgo: "1", ext: zip }
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # The native backend's build deps. Only Linux needs the apt packages
      # (go-gl/glfw links X11/GL via CGO); macOS uses the preinstalled Xcode SDK,
      # and Windows builds against the runner's bundled C toolchain + opengl32.
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: make setup

      - name: Build
        shell: bash
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          bin=client
          [ "$GOOS" = windows ] && bin=client.exe

          # Stamp build metadata into the binary via -ldflags -X, mirroring the
          # Makefile's GO_LDFLAGS block (keep the two in sync) — without it the
          # released binary's `-version` prints "unknown" for every field.
          # CI-specific values: Version is the release tag; Branch is derived
          # from the tag's rev prefix (rev245.2-v… -> rev-245.2) because the tag
          # is checked out in detached HEAD, so `git rev-parse --abbrev-ref HEAD`
          # would just yield "HEAD"; BuildUser is the CI identity rather than a
          # runner-local whoami@hostname. None of these values contain spaces,
          # so the assembled ldflags string splits cleanly for the linker.
          vprefix=github.com/zsrv/goscape-client/pkg/util/build
          revision=$(git rev-parse --short HEAD)
          branch=$(sed -E 's/^rev([0-9][0-9.]*)-v.*/rev-\1/' <<<"$VERSION")
          build_user="${GITHUB_ACTOR:-ci}@github-actions"
          build_date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ldflags="-s -w"
          ldflags="$ldflags -X $vprefix.Version=$VERSION"
          ldflags="$ldflags -X $vprefix.Revision=$revision"
          ldflags="$ldflags -X $vprefix.Branch=$branch"
          ldflags="$ldflags -X $vprefix.BuildUser=$build_user"
          ldflags="$ldflags -X $vprefix.BuildDate=$build_date"
          go build -trimpath -ldflags "$ldflags" -o "dist/$bin" ./cmd/client

      - name: Archive (tar.gz)
        if: matrix.ext == 'tar.gz'
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: tar -C dist -czf "client-$VERSION-$TARGET.tar.gz" client

      - name: Archive (zip)
        if: matrix.ext == 'zip'
        shell: pwsh
        env:
          VERSION: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: Compress-Archive -Path dist/client.exe -DestinationPath "client-$env:VERSION-$env:TARGET.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: client-*.${{ matrix.ext }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: sha256sum client-* > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            artifacts/client-*
            artifacts/SHA256SUMS
          fail_on_unmatched_files: true
          generate_release_notes: true
