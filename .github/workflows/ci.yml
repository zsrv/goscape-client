# CI for goscape-client.
#
# Runs the shared gate (ci-gate.yml: `make ci` inside the devcontainer image)
# on every push to a revision branch (rev-*) and every PR targeting one. The
# default `main` branch is docs-only (no Go code), so it is intentionally not
# built here. The gate is defined ONCE in ci-gate.yml and reused here and by
# release.yml's pre-build test gate.
#
# Security: the only ${{ }} use is github.ref in the concurrency group
# (a controlled value).
name: CI

on:
  push:
    branches: ['rev-*']
  pull_request:
    branches: ['rev-*']

permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci-gate.yml
