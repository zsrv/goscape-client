# CI for goscape-client.
#
# Runs the shared gate (ci-gate.yml: `make ci` inside the devcontainer image)
# on every push to main and every PR. The gate is defined ONCE in ci-gate.yml
# and reused here and by release.yml's pre-build test gate.
#
# Security: the only ${{ }} use is github.ref in the concurrency group
# (a controlled value).
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci-gate.yml
