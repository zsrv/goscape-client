<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<!-- Pre-boot placeholder only: the WebGL backend overwrites document.title
	     at startup with the title passed to platform.Main (cmd/client/main.go),
	     which carries the live signlink.ClientVersion. Keep in sync manually. -->
	<title>RS2 user client - release #254</title>
	<style>
		html, body { margin: 0; background: #000; }
		#app { display: block; image-rendering: pixelated; }
	</style>
</head>
<body>
	<canvas id="app"></canvas>
	<script src="wasm_exec.js"></script>
	<script>
		// argv: program name + the client's CLI args, taken from ?argv=...
		// (space-separated), defaulting to a sensible local run. wasmserve's
		// log prints an example URL. window.location drives the WebSocket /
		// cache origin (see signlink.ConfigureTransport, codebase_js.go).
		const params = new URLSearchParams(window.location.search);
		const argv = (params.get("argv") || "-node-id 10 -mem high -world-type members").split(/\s+/).filter(Boolean);
		const go = new Go();
		go.argv = ["client", ...argv];
		WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject)
			.then((res) => go.run(res.instance))
			.catch((err) => { document.body.innerText = "load error: " + err; });
	</script>
</body>
</html>
